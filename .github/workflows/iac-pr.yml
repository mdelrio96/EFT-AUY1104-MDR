name: Análisis IaC en pull request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality_and_security:
    name: TFLint → Checkov → Terraform validate → OPA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform fmt -check
        run: terraform fmt -check -recursive

      - name: Terraform init (sin backend)
        run: terraform init -backend=false -input=false

      - name: Instalar TFLint
        run: |
          curl -sL "https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh" | bash

      - name: TFLint init y ejecución
        run: |
          tflint --init
          tflint --minimum-failure-severity=warning

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Instalar Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Run Checkov
        run: checkov -d . --framework terraform --download-external-modules false --compact --skip-path policies --skip-check CKV_TF_1,CKV_AWS_24,CKV_AWS_382,CKV2_AWS_5

      - name: Terraform validate
        run: terraform validate

      - name: Instalar OPA
        run: |
          curl -sSL -o opa https://github.com/open-policy-agent/opa/releases/download/v0.69.0/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: OPA test (políticas)
        run: opa test policies/
